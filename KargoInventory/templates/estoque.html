{% extends "base.html" %}
{% block content %}
<h3>Estoque</h3>
<table class="table">
<tr><th>Produto</th><th>Quantidade</th></tr>
{% for e in estoque %}
<tr>
<td>{{ e.produto.nome }}</td>
<td>{% if e.quantidade <= 5 %}<span class="badge bg-danger">{{ e.quantidade }}</span>{% else %}{{ e.quantidade }}{% endif %}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
